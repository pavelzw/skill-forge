context:
  skill: pr-review

package:
  name: agent-skill-${{ skill }}
  version: "0.0.1"

source:
  - path: ../../LICENSE

build:
  number: 0
  noarch: generic
  script:
    - mkdir -p $PREFIX/share/agent-skills/${{ skill }}
    - cp $RECIPE_DIR/SKILL.md $PREFIX/share/agent-skills/${{ skill }}/SKILL.md

tests:
  - package_contents:
      files:
        - share/agent-skills/${{ skill }}/SKILL.md
      strict: true
  - script:
      - agentskills validate $CONDA_PREFIX/share/agent-skills/${{ skill }}
    requirements:
      run:
        - skills-ref

about:
  summary: Interactive pull request review workflow
  description: |
    Guides the agent through a structured pull request review:
    - Reads all existing PR comments (including pending review comments) before reviewing
    - Focuses on logic errors, edge cases, and maintainability
    - Groups findings by severity (blocking, important, nits) into a markdown file with
      stable IDs, code references, and proposed GitHub comments
    - Iterates with the human on the findings file before pushing
    - Pushes the inline comments as a pending review via the gh CLI only after
      explicit approval — never submits; the human writes the summary and
      submits in the GitHub UI
  homepage: https://github.com/pavelzw/skill-forge
  repository: https://github.com/pavelzw/skill-forge
  documentation: https://github.com/pavelzw/skill-forge
  license: BSD-3-Clause
  license_file: LICENSE
