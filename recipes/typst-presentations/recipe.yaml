context:
  skill: typst-presentations

package:
  name: agent-skill-${{ skill }}
  version: "0.0.1"

build:
  number: 0
  noarch: generic
  script:
    - mkdir -p $PREFIX/share/agent-skills/${{ skill }}
    - cp $RECIPE_DIR/SKILL.md $PREFIX/share/agent-skills/${{ skill }}/SKILL.md

requirements:
  run:
    - agent-skill-typst
    - agent-skill-presentation-design
  run_constraints:
    - typst >=0.14.2,<0.15

tests:
  - package_contents:
      files:
        - share/agent-skills/${{ skill }}/SKILL.md
      strict: true
  - script:
      - agentskills validate $CONDA_PREFIX/share/agent-skills/${{ skill }}
    requirements:
      run:
        - skills-ref

about:
  summary: Agent skill for creating visually appealing presentations with Typst
  description: |
    Create visually appealing presentations with Typst by combining
    typesetting knowledge with presentation design principles:
    - Visual feedback loop: compile slides to PNG and inspect after each edit
    - 16:9 page setup when no template is available
    - Leverages Touying and Polylux for slide-specific features
  homepage: https://typst.app
  repository: https://github.com/pavelzw/skill-forge
  documentation: https://typst.app/docs
  license: BSD-3-Clause
