source:
  git: https://github.com/pydantic/skills
  rev: cb098e838fb9a280141b34825e4db112afb05256

about:
  license: MIT
  license_file: LICENSE
  homepage: https://ai.pydantic.dev/
  repository: https://github.com/pydantic/skills

outputs:
  - context:
      skill: building-pydantic-ai-agents
    package:
      name: agent-skill-${{ skill }}
      version: "0.0.1"
    build:
      number: 0
      noarch: generic
      script:
        - mkdir -p $PREFIX/share/agent-skills/${{ skill }}
        - cp -R skills/${{ skill }}/* $PREFIX/share/agent-skills/${{ skill }}
    tests:
      - package_contents:
          files:
            - share/agent-skills/${{ skill }}/SKILL.md
      - script:
          - agentskills validate $CONDA_PREFIX/share/agent-skills/${{ skill }}
        requirements:
          run:
            - skills-ref
    about:
      summary: Build AI agents with Pydantic AI
      description: |
        Patterns, architecture guidance, and tested code examples for building
        production-grade AI applications with Pydantic AI:
        - Tools, capabilities, structured output, and streaming
        - Multi-agent patterns and delegation
        - Testing agent behavior
        - Agent observability with Logfire
      documentation: https://ai.pydantic.dev/

  - context:
      skill: logfire-instrumentation
      # The SKILL.md frontmatter uses name: instrumentation
      skill_name: instrumentation
    package:
      name: agent-skill-${{ skill }}
      version: "0.0.1"
    build:
      number: 0
      noarch: generic
      script:
        - mkdir -p $PREFIX/share/agent-skills/${{ skill_name }}
        - cp -R skills/${{ skill }}/* $PREFIX/share/agent-skills/${{ skill_name }}
    tests:
      - package_contents:
          files:
            - share/agent-skills/${{ skill_name }}/SKILL.md
      - script:
          - agentskills validate $CONDA_PREFIX/share/agent-skills/${{ skill_name }}
        requirements:
          run:
            - skills-ref
    about:
      summary: Add Pydantic Logfire observability to applications
      description: |
        Instrument applications with Pydantic Logfire for observability:
        - Structured logging, tracing, and metrics via OpenTelemetry
        - Native SDKs for Python, JavaScript/TypeScript, and Rust
        - Monitor AI/LLM calls (PydanticAI, OpenAI, Anthropic)
      documentation: https://logfire.pydantic.dev/
