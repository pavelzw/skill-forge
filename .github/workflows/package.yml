name: Package
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest
    outputs:
      has-packages: ${{ steps.check.outputs.has-packages }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
      - name: Build packages
        shell: bash
        run: |
          pixi run build-new

          # https://github.com/prefix-dev/rattler-build/issues/2112
          # Check if any packages were built
          if [ ! -d "./output" ] || [ -z "$(find ./output -type f -name "*.conda" 2>/dev/null)" ]; then
            echo "❌ no package was built, did you increment the recipe version?" >> "$GITHUB_STEP_SUMMARY"
          fi
          cp "$GITHUB_STEP_SUMMARY" pr-comment.md
        env:
          RATTLER_BUILD_ENABLE_GITHUB_INTEGRATION: true
          RATTLER_BUILD_COLOR: always
      - name: Check for packages
        id: check
        shell: bash
        run: |
          shopt -s nullglob
          files=(output/**/*.conda)
          if [ ${#files[@]} -gt 0 ]; then
            echo "has-packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-packages=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Comment on PR
        if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: package-build
          path: pr-comment.md
          ignore_empty: true
      - name: Upload build artifacts
        if: steps.check.outputs.has-packages == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: output
          path: output/**/*.conda

  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    needs: build
    if: github.event_name == 'push' && needs.build.outputs.has-packages == 'true'
    environment: upload
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          activate-environment: true
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: output
          path: output
      - name: Upload package to prefix.dev
        if: github.event_name == 'push'
        run: |
          rattler-build publish --to https://prefix.dev/skill-forge --generate-attestation output/**/*.conda
