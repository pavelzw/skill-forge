name: Package
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest
    outputs:
      has-packages: ${{ steps.check.outputs.has-packages }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
      - name: Build packages
        shell: bash
        run: |
          pixi run build-new

          # https://github.com/prefix-dev/rattler-build/issues/2112
          # Check if any packages were built
          if [ ! -d "./output" ] || [ -z "$(find ./output -type f -name "*.conda" 2>/dev/null)" ]; then
            echo "❌ no package was built, did you increment the recipe version?" >> "$GITHUB_STEP_SUMMARY"
          fi
          cp "$GITHUB_STEP_SUMMARY" pr-comment.md
        env:
          RATTLER_BUILD_ENABLE_GITHUB_INTEGRATION: true
          RATTLER_BUILD_COLOR: always
      - name: Check for packages
        id: check
        shell: bash
        run: |
          shopt -s nullglob
          files=(output/**/*.conda)
          if [ ${#files[@]} -gt 0 ]; then
            echo "has-packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-packages=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Comment on PR
        if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        with:
          header: package-build
          path: pr-comment.md
          ignore_empty: true
      - name: Upload build artifacts
        if: steps.check.outputs.has-packages == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: output
          path: output/**/*.conda

  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    needs: build
    if: github.event_name == 'push' && needs.build.outputs.has-packages == 'true'
    environment: upload
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
        with:
          activate-environment: true
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: output
          path: output
      - name: Get JWT
        id: get_token
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const token = await core.getIDToken('prefix.dev')
            core.setOutput('token', token)
      - name: Mint the API Key on prefix.dev
        shell: bash
        run: |
          TOKEN="${{ steps.get_token.outputs.token }}"
          RESPONSE="$(curl -s -X POST                 \
              https://prefix.dev/api/oidc/mint_token \
              -H 'Content-Type: application/json'    \
              --data "{\"token\": \"$TOKEN\"}")"
          # mask the response
          echo "::add-mask::$RESPONSE"
          echo "PREFIX_API_KEY=$RESPONSE" >> "$GITHUB_ENV"
      - name: Upload package to prefix.dev
        if: github.event_name == 'push'
        run: |
          rattler-build upload prefix --generate-attestation -c skill-forge output/**/*.conda
