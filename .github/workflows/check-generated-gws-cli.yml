name: Check generated gws-cli recipe
on:
  push:
    branches: [main]
    paths:
      - recipes/gws-cli/**
  pull_request:
    paths:
      - recipes/gws-cli/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check gws-cli recipe is up to date
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
      - name: Regenerate recipe
        run: pixi run generate-gws-cli
      - name: Check for differences
        run: git diff --exit-code recipes/gws-cli/recipe.yaml recipes/gws-cli/SKILLS.md
