name: Autobump
on:
  workflow_dispatch:
    inputs:
      skill:
        description: Skill to bump.
        required: true
  schedule:
    - cron: "0 5 * * *"

jobs:
  bump:
    strategy:
      fail-fast: false
      matrix:
        include:
          # git-main strategy (track main branch)
          - skill: librarian
            strategy: git-main
          - skill: polars
            strategy: git-main
          - skill: pydantic-skills
            strategy: git-main
          # generate strategy (re-run generate.py with latest rev)
          - skill: gws-cli
            strategy: generate
    name: Bump ${{ matrix.skill }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5

      - name: Bump version
        run: pixi run .github/scripts/update.sh ${{ matrix.skill }} ${{ matrix.strategy }}
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: ${{ github.repository }}
          identity: write

      - name: Create Pull Request
        if: (github.event_name == 'schedule' || github.event.inputs.skill == matrix.skill) && steps.bump.outputs.old-version != steps.bump.outputs.new-version
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          title: Bump ${{ matrix.skill }} from ${{ steps.bump.outputs.old-version }} to ${{ steps.bump.outputs.new-version }}
          commit-message: Bump ${{ matrix.skill }} from ${{ steps.bump.outputs.old-version }} to ${{ steps.bump.outputs.new-version }}
          branch: bump-${{ matrix.skill }}
          delete-branch: true
          token: ${{ steps.octo-sts.outputs.token }}
          body: |
            # ${{ matrix.skill }}

            `${{ steps.bump.outputs.old-version }}` -> `${{ steps.bump.outputs.new-version }}`

            Strategy: `${{ matrix.strategy }}`
