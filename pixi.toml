[workspace]
channels = ["conda-forge"]
exclude-newer = "7d"
name = "skill-forge"
platforms = ["osx-arm64", "linux-64"]
preview = ["pixi-build"]

[tasks]
pre-commit-install = "pre-commit install"
lint = "pre-commit run -a"
build-new = "rattler-build build -c https://prefix.dev/skill-forge -c conda-forge --recipe-dir recipes/ --skip-existing=all"
build-all = "rattler-build build -c https://prefix.dev/skill-forge -c conda-forge --recipe-dir recipes/"
generate-gws-cli = "python recipes/gws-cli/generate.py"

[dependencies]
skills-ref = "*"
go-yq = "*"
rattler-build = "*"
pre-commit = "*"
check-jsonschema = "*"
shellcheck = "*"
pre-commit-hooks = "*"
taplo = "*"
typos = "*"
zizmor = "*"
python = ">=3.14"
"ruamel.yaml" = ">=0.18"
